name: Disable unreachable server mobile preview

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/disable-server-preview.yml"
  workflow_dispatch:

jobs:
  disable:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start ssh agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust server host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT || '22' }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Stop preview and remove only its Nginx routes
        run: |
          ssh \
            -o IPQoS=none \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -p "${{ secrets.DEPLOY_SSH_PORT || '22' }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "bash -s" \
            < deploy/server-disable-mobile-preview.sh
